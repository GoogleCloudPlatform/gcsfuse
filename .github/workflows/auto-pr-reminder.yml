name: Auto Add Label on Ready for Review or Reopen PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
    branches:
      - master

jobs:
  add-label:
    # This condition ensures the label is only added if the PR is not a draft.
    # When a PR is reopened, it is never in a draft state.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Add 'remind-reviewers' label
        uses: actions/github-script@v7
        with:
          script: |
            // List of authors to exclude from reminders.
            const excludedAuthors = [
              'dependabot[bot]',
            ];

            const author = context.payload.pull_request.user.login;
            console.log(`Pull Request author is: ${author}`);

            // Check if the author is in the exclusion list.
            if (excludedAuthors.includes(author)) {
              console.log(`Author '${author}' is in the exclusion list. Skipping label addition.`);
              return;
            }

            // Attempt to add the 'remind-reviewers' label.
            // Wrapped in try-catch to gracefully handle permission failures (e.g., fork PRs with read-only tokens
            // or restricted GITHUB_TOKEN settings), ensuring label addition failure does not block PR submission.
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['remind-reviewers']
              });
            } catch (error) {
              console.log(`Unable to add 'remind-reviewers' label (e.g., restricted permissions or fork PR): ${error.message}. Silently skipping.`);
            }
