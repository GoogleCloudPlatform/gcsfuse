# gcs-bench example: UNet3D-like random read workload — MultiRangeDownloader variant
#
# Identical workload to unet3d-like.yaml but uses read-type: multirange instead
# of the default new-reader path.  On RAPID / zonal buckets the MultiRangeDownloader
# (bidi-gRPC) path amortizes connection-setup cost by reusing an LRU cache of open
# streams (up to 2048 entries), which can improve throughput and reduce tail latency
# when reading the same objects repeatedly.
#
# When to use this config vs. unet3d-like.yaml:
#   new-reader (default): best for large object sets where every read is cold,
#                          or for non-RAPID buckets using standard HTTP/2.
#   multirange (this):    best for repeated reads of a bounded object set on
#                          RAPID/zonal buckets where bidi-gRPC is active.
#
# Directory structure (matches rdf-bench FSD: width=28, depth=2, files=64):
#   width=28, depth=2  →  28² = 784 leaf directories
#   784 dirs × 64 files  =  50,176 total objects
#   Size distribution: lognormal, real-space mean ≈ 6.9 MiB, σ ≈ 5.5 MiB
#                       clamped to [1 MiB, 32 MiB]
#
# Requires objects to already exist in the bucket. Use gcs-bench bench
# --dry-run to verify the config before connecting.
#
# Run:
#   gcs-bench bench --config unet3d-like-mrd.yaml
#   gcs-bench bench --config unet3d-like-mrd.yaml --dry-run

benchmark:
  # Target GCS bucket.
  bucket: "my-bucket-name"

  # All objects live under this prefix.
  object-prefix: "unet3d/"

  # Measurement phase: 5 minutes matches standard MLPerf Storage run.
  duration: 5m

  # Warmup period: 30s primes caches and eliminates cold-start latency spikes.
  warmup-duration: 30s

  # Total goroutines across all tracks. 32 matches rdf-bench threads=32.
  total-concurrency: 32

  output-path: "./results"
  output-format: both

  # RAPID/zonal bucket detection (auto = call GetStorageLayout at startup).
  # Use "on" to force bidi-gRPC without detection, "off" for standard HTTP/2.
  rapid-mode: auto

  histograms:
    min-value-micros: 1         # 1 µs minimum (unlikely to see faster GCS reads)
    max-value-micros: 60000000  # 60 s maximum (covers worst-case tail latencies)
    significant-digits: 3       # 0.1% precision

  tracks:
    - name: unet3d-read
      op-type: read
      # "multirange" reuses a pool of open bidi-gRPC connections (LRU, 2048
      # entries) rather than opening a new connection for every read.
      read-type: multirange
      weight: 1
      access-pattern: random   # Each goroutine picks files uniformly at random

      # Nested directory tree matching the rdf-bench FSD parameters:
      #   width=28, depth=2, files_per_dir=64
      # Total paths generated: 28² × 64 = 50,176
      directory-structure:
        width: 28              # 28 subdirectories per level
        depth: 2               # 2 levels deep
        files-per-dir: 64      # 64 objects per leaf directory
        dir-pattern: "dir-%04d"   # → dir-0000/ … dir-0027/
        file-pattern: "obj-%06d"  # → obj-000000 … obj-000063

      # read-size: 0 means read the entire object in one MRD Add() call.
      read-size: 0

      # SizeSpec is used by --dry-run to report expected sizes.
      # These parameters match the rdf-bench size distribution:
      #   sizes=(1m,10,2m,20,4m,30,8m,25,16m,10,32m,5) weighted average ≈ 6.9 MiB
      size-spec:
        type: lognormal
        mean: 7235174     # Real-space mean ≈ 6.90 MiB
        std-dev: 5788139  # Real-space std dev ≈ 5.52 MiB
        min: 1048576      # Clamp floor: 1 MiB
        max: 33554432     # Clamp ceiling: 32 MiB
